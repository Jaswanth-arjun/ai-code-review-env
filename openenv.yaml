name: ai-code-review-env
version: 1.0.0
description: Real-world environment for AI code review tasks. Agent must identify bugs, security issues, and performance problems in code, suggest fixes, and make review decisions.

author: AI Engineer
license: MIT

actions:
  type: object
  properties:
    issues_found:
      type: array
      items:
        type: string
      description: List of identified issues
    severity:
      type: string
      enum: [low, medium, high]
      description: Overall severity level
    suggestion:
      type: string
      description: Suggested fix or improvement
    decision:
      type: string
      enum: [approve, reject, needs_changes]
      description: Final review decision
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Confidence in the review

observations:
  type: object
  properties:
    code:
      type: string
      description: Code to review
    language:
      type: string
      description: Programming language
    history:
      type: array
      items:
        type: string
      description: History of previous actions
    current_step:
      type: integer
      description: Current step number
    max_steps:
      type: integer
      description: Maximum steps allowed

rewards:
  type: object
  properties:
    score:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Reward score
    details:
      type: object
      description: Detailed reward breakdown

tasks:
  - id: task_easy_1
    difficulty: easy
    description: Simple bug detection - identify division by zero risk in average calculation
    max_steps: 5
    
  - id: task_medium_1
    difficulty: medium
    description: Logical and security issues - hardcoded credentials, missing validation
    max_steps: 5
    
  - id: task_hard_1
    difficulty: hard
    description: Multiple issues - performance, security, memory leaks, off-by-one errors
    max_steps: 5

metadata:
  max_episode_steps: 5
  version: "1.0.0"
  tags: ["code-review", "ai-agent", "software-engineering", "security"]