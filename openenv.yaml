name: ai-code-review-env
version: 1.0.0
description: Real-world environment for AI code review tasks. Agent must identify bugs, security issues, and performance problems in code, suggest fixes, and make review decisions.

author: AI Engineer
license: MIT

actions:
  type: object
  properties:
    issues_found:
      type: array
      items:
        type: string
      description: List of identified issues
    severity:
      type: string
      enum: [low, medium, high]
      description: Overall severity level
    suggestion:
      type: string
      description: Suggested fix or improvement
    decision:
      type: string
      enum: [approve, reject, needs_changes, continue_review]
      description: Review decision; use continue_review to defer final approval/rejection
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Confidence in the review

observations:
  type: object
  properties:
    task_id:
      type: string
      description: Active task identifier
    difficulty:
      type: string
      enum: [easy, medium, hard]
      description: Task difficulty band
    review_context:
      type: object
      additionalProperties:
        type: string
      description: Simulated PR metadata (title, path, policy). Does not contain ground-truth answers.
    code:
      type: string
      description: Code to review
    language:
      type: string
      description: Programming language
    history:
      type: array
      items:
        type: string
      description: History of previous actions
    current_step:
      type: integer
      description: Current step number
    max_steps:
      type: integer
      description: Maximum steps allowed

rewards:
  type: object
  properties:
    score:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Reward score
    details:
      type: object
      description: Detailed reward breakdown

tasks:
  - id: task_easy_1
    difficulty: easy
    description: Subtle logic error - incorrect pagination offset calculation leading to skipped records
    max_steps: 5
    
  - id: task_medium_1
    difficulty: medium
    description: Modern security flaws - HMAC timing attack and replay attack vulnerabilities in webhook verification
    max_steps: 5

  - id: task_medium_2
    difficulty: medium
    description: Unsafe process invocation - shell=True with operator-controlled snippets enabling command execution
    max_steps: 5
    
  - id: task_hard_1
    difficulty: hard
    description: Distributed systems complexity - Race condition (TOC/TOU) in async flow combined with IDOR vulnerability
    max_steps: 5

metadata:
  max_episode_steps: 5
  version: "1.0.0"
  tags: ["code-review", "ai-agent", "software-engineering", "security"]